name: Bug report
description: Report a bug in Supervertaler for Trados
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please complete **every** required field below — without your plugin and Trados Studio versions we usually can't reproduce or investigate the problem.

        For questions, feature requests, or general help, please use the [Supervertaler Forum](https://forum.supervertaler.com/viewforum.php?f=14) instead.
  - type: input
    id: plugin-version
    attributes:
      label: Supervertaler for Trados version
      description: "The plugin version — shown in the Supervertaler Assistant pane (About), or in Trados Studio under Add-Ins."
      placeholder: "e.g. 4.20.46"
    validations:
      required: true
  - type: dropdown
    id: studio-version
    attributes:
      label: Trados Studio version
      options:
        - Trados Studio 2024
        - Trados Studio 2026
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install the plugin?
      options:
        - RWS AppStore
        - Manually (.sdlplugin)
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: "Describe the bug, and what you expected to happen instead."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: "Optional but very helpful — you can drag images straight into this box."
    validations:
      required: false
