# The "New issue" chooser. Bug reports use the Bug form below and become normal
# GitHub issues; feature requests, questions and general discussion go to the
# org-level GitHub Discussions board (shared with Workbench). blank_issues_enabled
# stays true so the maintainer can also open roadmap / [Feature] issues directly.
blank_issues_enabled: true
contact_links:
  - name: 💡 Feature requests & ideas
    url: https://github.com/orgs/Supervertaler/discussions
    about: Suggest features and discuss ideas for the Trados plugin in GitHub Discussions.
  - name: ❓ Questions & how-to help
    url: https://github.com/orgs/Supervertaler/discussions
    about: For usage questions, installation, licensing and general discussion, please post in GitHub Discussions.
  - name: 🛟 RWS App Store listing
    url: https://appstore.rws.com/plugin/432
    about: Plugin page and reviews on the RWS App Store.
