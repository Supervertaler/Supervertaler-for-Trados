name: Feature request
description: Suggest a new feature or improvement for Supervertaler for Trados
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! A clear description of the problem you're trying to solve helps far more than a pre-baked solution.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: "What are you trying to do, and where does the plugin get in your way today?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: "What would you like to see? Describe the feature or change."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any workarounds you currently use, or other approaches you've thought about."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Anything else — screenshots, mockups, examples from other tools."
    validations:
      required: false
